name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: CI / checks          # ← это имя будет видно в статусе
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --extra dev --extra fastapi --extra mcp --extra postgres

      - name: Lint (ruff)
        run: uv run task lint

      - name: Typecheck (mypy)
        run: uv run task typecheck

      - name: Pylint
        run: uv run task pylint

      - name: Vulture (dead code)
        run: uv run task dead

      - name: Test layer imports
        run: uv run task test-layer-imports

      - name: Pytest
        run: uv run task test

      - name: Radon CC
        run: uv run task cc

      - name: Radon MI
        run: uv run task mi