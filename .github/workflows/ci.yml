# Mirrors local checks from run_checks_with_log.sh (without ruff --fix: CI must not mutate the tree).
#
# Local script order:
#   ruff check --fix .  → skipped here; use `uv run task lint` only
#   task lint | typecheck | pylint | dead | test-layer-imports | test | cc | mi

name: CI

# GitHub is moving Actions off Node 20; opt in so checkout/setup actions stay supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      # dev: linters/pytest; fastapi+mcp: mypy; postgres: pylint import graph для integrations/postgres
      - name: Sync dependencies
        run: uv sync --extra dev --extra fastapi --extra mcp --extra postgres

      - name: Lint (ruff)
        run: uv run task lint

      - name: Typecheck (mypy full src/)
        run: uv run task typecheck

      - name: Pylint
        run: uv run task pylint

      - name: Vulture (dead code)
        run: uv run task dead

      - name: Test layer imports
        run: uv run task test-layer-imports

      - name: Pytest
        run: uv run task test

      - name: Radon cyclomatic complexity
        run: uv run task cc

      - name: Radon maintainability index
        run: uv run task mi
