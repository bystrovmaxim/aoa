# Branch protection: require exactly — CI / tests (pull_request)
# Job display name must be plain "tests", not "CI / …" (otherwise UI shows CI / CI / …).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Install project + tooling
        run: uv sync --extra dev --extra fastapi --extra mcp --extra postgres

      - run: uv run task lint
      - run: uv run task typecheck
      - run: uv run task pylint
      - run: uv run task dead
      - run: uv run task test-layer-imports
      - run: uv run task test
      - run: uv run task cc
      - run: uv run task mi
