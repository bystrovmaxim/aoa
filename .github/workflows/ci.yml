name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Run Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra all

      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "🌿 Branch: $BRANCH"
          if [[ "$BRANCH" == "main" ]]; then
            echo "❌ Cannot PR directly from main"
            exit 1
          fi
          echo "✅ Branch name is valid"

      - name: Ruff autofix
        run: uv run ruff check --fix .

      - name: Lint (ruff)
        run: uv run task lint

      - name: Type check (mypy)
        run: uv run task typecheck

      - name: Pylint
        run: uv run task pylint

      - name: Dead code (vulture)
        run: uv run task dead

      - name: Import boundaries
        run: uv run task test-layer-imports

      - name: Tests (pytest)
        run: uv run task test

      - name: Cyclomatic complexity (radon cc)
        run: uv run task cc

      - name: Maintainability index (radon mi)
        run: uv run task mi
