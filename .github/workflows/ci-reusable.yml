# Shared steps for PR merge gate and post-merge push. Invoked only via workflow_call.
name: CI checks (internal)

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --extra dev --extra fastapi --extra mcp --extra postgres

      - name: Lint (ruff)
        run: uv run task lint

      - name: Typecheck (mypy full src/)
        run: uv run task typecheck

      - name: Pylint
        run: uv run task pylint

      - name: Vulture (dead code)
        run: uv run task dead

      - name: Test layer imports
        run: uv run task test-layer-imports

      - name: Pytest
        run: uv run task test

      - name: Radon cyclomatic complexity
        run: uv run task cc

      - name: Radon maintainability index
        run: uv run task mi
