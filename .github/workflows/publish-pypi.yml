# Publish sdist + wheel to PyPI when a version tag is pushed (e.g. v1.0.1).
#
# Setup (once per repo):
#   1. PyPI → Account settings → API tokens → create token (scope: project or whole account).
#   2. GitHub → repo → Settings → Secrets and variables → Actions → New repository secret
#      Name:  PYPI_API_TOKEN
#      Value: the token (paste only here, never in chat or commits).
#   3. Bump version in pyproject.toml, commit, then:
#        git tag v1.0.1
#        git push origin v1.0.1
#
# PyPI rejects re-uploading the same version; each release needs a new version number.

name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
