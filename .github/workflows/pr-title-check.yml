name: PR Title Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  check-title:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title is not empty
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "📋 PR Title: $TITLE"
          if [ -z "$TITLE" ]; then
            echo "❌ PR title cannot be empty"
            exit 1
          fi
          echo "✅ PR title is valid"
