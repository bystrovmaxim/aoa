name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC Trusted Publishers

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Build packages
        run: |
          uv build --package aoa-action-machine --out-dir packages/aoa-action-machine/dist

      - name: Publish aoa-action-machine
        run: uv publish packages/aoa-action-machine/dist/*
        continue-on-error: true

      # Uncomment after registering aoa-maxitor Pending Publisher on PyPI:
      # - name: Publish aoa-maxitor
      #   run: |
      #     uv build --package aoa-maxitor --out-dir packages/aoa-maxitor/dist
      #     uv publish packages/aoa-maxitor/dist/*
