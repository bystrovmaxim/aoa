name: Publish to PyPI

on:
  push:
    tags:
      - 'aoa-*-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - aoa-action-machine
          - aoa-fastapi-adapter
          - aoa-mcp-adapter
          - aoa-langgraph-adapter
          - aoa-otel
          - aoa-ocel
          - aoa-maxitor
          - aoa-examples

jobs:
  publish-aoa-action-machine:
    name: Publish aoa-action-machine
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/aoa-action-machine-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'aoa-action-machine')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build --package aoa-action-machine --out-dir packages/aoa-action-machine/dist
      - name: Publish
        run: uv publish packages/aoa-action-machine/dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-aoa-fastapi-adapter:
