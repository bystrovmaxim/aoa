name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra all --group dev

      - name: Build publishable packages
        run: |
          uv build --package aoa-graph
          uv build --package aoa-action-machine
          uv build --package aoa-maxitor
          uv build --package aoa-examples

      - name: Publish to PyPI
        run: >-
          uv publish --token ${{ secrets.PYPI_API_TOKEN }}
          packages/aoa-graph/dist/*
          packages/aoa-action-machine/dist/*
          packages/aoa-maxitor/dist/*
          packages/aoa-examples/dist/*
