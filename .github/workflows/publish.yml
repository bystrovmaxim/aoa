  publish-aoa-maxitor:
    name: Publish aoa-maxitor
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/aoa-maxitor-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'aoa-maxitor')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: packages/aoa-maxitor/client
        run: |
          npm ci
          npx vite build \
            --base=/ \
            --outDir ../src/aoa/maxitor/static \
            --emptyOutDir
      - name: Build
        run: uv build --package aoa-maxitor --out-dir packages/aoa-maxitor/dist
      - name: Publish
        run: uv publish packages/aoa-maxitor/dist/*
