  publish-aoa-otel:
    name: Publish aoa-otel
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/aoa-otel-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'aoa-otel')
