# Имя workflow – будет отображаться в интерфейсе GitVerse
name: Build and Push Python Docker Image

# Управление триггерами (когда запускать)
on:
  # Запускать при пушах в ветку master
  push:
    branches:
      - master
  # Позволяет запускать вручную из интерфейса
  workflow_dispatch:

# Переменные окружения, доступные во всех задачах
env:
  # Адрес реестра контейнеров GitVerse
  REGISTRY: "gitverse.ru"
  # Имя образа: логин/название_репозитория
  # ВНИМАНИЕ: замени bystrov.maxim на свой логин, если он отличается!
  IMAGE_NAME: "bystrov.maxim/kanban_assistant"

# Задачи (jobs) выполняются параллельно или последовательно
jobs:
  # Название задачи
  build-and-push:
    # Запускаем на стандартной виртуальной машине с Ubuntu
    runs-on: ubuntu-latest
    # Последовательность шагов
    steps:
      # Шаг 1: скачать код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: войти в реестр GitVerse, используя секретный токен
      - name: Log in to GitVerse Container Registry
        run: |
          echo "${{ secrets.GITVERSE_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
        # secrets.GITVERSE_TOKEN мы создадим позже в настройках репозитория

      # Шаг 3: собрать Docker-образ и отправить его в реестр
      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg YOUTRACK_TOKEN="${{ secrets.YOUTRACK_TOKEN }}" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        # --build-arg передаёт токен в Dockerfile, а тот сохраняет его как ENV