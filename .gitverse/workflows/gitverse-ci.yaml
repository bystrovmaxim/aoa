name: Build and Push Python Docker Image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: "gitverse.ru"
  IMAGE_NAME: "bystrov.maxim/kanban_assistant"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Если раннер разрешает привилегированный режим, раскомментируй следующую строку:
    # privileged: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug info
        run: |
          echo "User: ${{ github.actor }}"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      # Шаг 1: проверяем наличие Kaniko
      - name: Check for Kaniko
        id: check_kaniko
        run: |
          if command -v kaniko || [ -f /kaniko/executor ]; then
            echo "has_kaniko=true" >> $GITHUB_OUTPUT
            echo "Kaniko found"
          else
            echo "has_kaniko=false" >> $GITHUB_OUTPUT
            echo "Kaniko not found"
          fi

      # Шаг 2: если Kaniko есть, используем его
      - name: Build and push with Kaniko
        if: steps.check_kaniko.outputs.has_kaniko == 'true'
        run: |
          # Создаём конфиг для аутентификации
          mkdir -p /kaniko/.docker
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GIT_VERSE_TOKEN }}" | base64 -w 0)
          echo "{\"auths\":{\"${{ env.REGISTRY }}\":{\"auth\":\"$AUTH\"}}}" > /kaniko/.docker/config.json
          # Запускаем Kaniko
          /kaniko/executor \
            --context=dir://$(pwd) \
            --dockerfile=Dockerfile \
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --build-arg YOUTRACK_TOKEN=${{ secrets.YOUTRACK_TOKEN }} \
            --cache=true

      # Шаг 3: если Kaniko нет, пробуем запустить dockerd вручную (требует privileged: true)
      - name: Start Docker daemon (fallback)
        if: steps.check_kaniko.outputs.has_kaniko == 'false'
        run: |
          # Запускаем демон в фоне
          dockerd --host=tcp://0.0.0.0:2375 --host=unix:///var/run/docker.sock &
          # Ждём готовности
          timeout 30 sh -c 'until docker version; do sleep 2; done'

      - name: Log in to GitVerse Registry (fallback)
        if: steps.check_kaniko.outputs.has_kaniko == 'false'
        run: |
          echo "${{ secrets.GIT_VERSE_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
        env:
          DOCKER_HOST: tcp://localhost:2375

      - name: Build and push with Docker (fallback)
        if: steps.check_kaniko.outputs.has_kaniko == 'false'
        run: |
          docker build \
            --build-arg YOUTRACK_TOKEN="${{ secrets.YOUTRACK_TOKEN }}" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        env:
          DOCKER_HOST: tcp://localhost:2375