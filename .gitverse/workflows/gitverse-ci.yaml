name: Build and Push Multi-Arch Docker Image (amd64 + arm64)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: "gitverse.ru"
  IMAGE_NAME: "bystrov.maxim/kanban_assistant"
  PLATFORMS: "linux/amd64,linux/arm64"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Для DinD необходим привилегированный режим
    options: --privileged
    services:
      docker:
        image: docker:dind
        options: --privileged
        ports:
          - 2375:2375

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ждём, пока Docker-демон запустится (обращаемся к localhost)
      - name: Wait for Docker daemon
        run: |
          timeout 30 sh -c 'until docker version; do sleep 2; done'
        env:
          DOCKER_HOST: tcp://localhost:2375

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          endpoint: tcp://localhost:2375   # используем localhost

      - name: Log in to GitVerse Container Registry
        run: |
          echo "${{ secrets.GIT_VERSE_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
        env:
          DOCKER_HOST: tcp://localhost:2375

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            YOUTRACK_TOKEN=${{ secrets.YOUTRACK_TOKEN }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max