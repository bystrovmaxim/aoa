# ============================================================================
# pyproject.toml — ActionMachine
# ============================================================================

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ============================================================================
# МЕТАДАННЫЕ
# ============================================================================
[project]
name = "action-machine"
version = "0.1.0"
description = "Intent-first business logic framework for Python — async, declarative, observable"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

authors = [
    { name = "Maxim Bystrov", email = "bystrovmaxim@gmail.com" },
]

keywords = [
    "actions", "aspects", "async", "asyncio", "business-logic",
    "framework", "declarative", "intent-first", "python"
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]

# --------------------------------------------------------------------------
# Runtime-зависимости — только то, что импортируется в src/action_machine/
# --------------------------------------------------------------------------
dependencies = [
    "simpleeval>=1.0.7",       # Безопасное вычисление выражений (iif в шаблонах логов)
    "rustworkx>=0.16.0",       # Направленный ациклический граф сущностей
]

# --------------------------------------------------------------------------
# Optional (contrib) — устанавливаются через pip install action-machine[postgres]
# --------------------------------------------------------------------------
[project.optional-dependencies]
postgres = [
    "asyncpg>=0.31.0",
]
# Заготовки для будущих провайдеров (этап 3):
# fastapi = ["fastapi>=0.115.0", "uvicorn[standard]>=0.32.0"]
# mcp = ["mcp>=1.26.0"]

# ============================================================================
# URL-ы
# ============================================================================
[project.urls]
Homepage = "https://gitverse.ru/bystrov.maxim/aoa"
Repository = "https://gitverse.ru/bystrov.maxim/aoa"
Issues = "https://gitverse.ru/bystrov.maxim/aoa/issues"

# ============================================================================
# ГРУППЫ ЗАВИСИМОСТЕЙ (dev, test)
# ============================================================================
[dependency-groups]

dev = [
    "mypy>=1.19.0",
    "ruff>=0.9.0",
    "black>=25.1.0",
    "isort>=8.0.0",
    "asyncpg-stubs>=0.31.0",
    "pre-commit>=4.0.0",
]

test = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=6.0.0",
    "anyio>=4.12.0",
]

# ============================================================================
# СБОРКА
# ============================================================================
[tool.hatch.build.targets.wheel]
packages = [
    "src/action_machine",
    "src/action_machine_contrib",
]

# ============================================================================
# PYTEST
# ============================================================================
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-v",
    "-ra",
]
markers = [
    "slow: тесты, выполняющиеся более 1 секунды",
    "integration: тесты, требующие внешних сервисов",
    "unit: быстрые изолированные тесты",
]

# ============================================================================
# MYPY
# ============================================================================
[tool.mypy]
python_version = "3.12"
strict = true
follow_imports = "normal"
warn_unreachable = true
no_implicit_reexport = true
exclude = ["venv", ".venv", "build", "dist"]

[[tool.mypy.overrides]]
module = ["simpleeval.*", "asyncpg.*"]
ignore_missing_imports = true

# ============================================================================
# COVERAGE
# ============================================================================
[tool.coverage.run]
source = ["src/action_machine"]
omit = ["tests/*", "**/__init__.py"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "\\.\\.\\.",
    "pass",
    "raise NotImplementedError",
]
show_missing = true
fail_under = 85

# ============================================================================
# RUFF
# ============================================================================
[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "ASYNC"]
ignore = ["E501", "E402"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ASYNC"]

# ============================================================================
# BLACK
# ============================================================================
[tool.black]
line-length = 120
target-version = ["py312"]

# ============================================================================
# ISORT
# ============================================================================
[tool.isort]
profile = "black"
line_length = 120
src_paths = ["src", "tests"]
