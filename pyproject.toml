# ============================================================================
# pyproject.toml — ActionMachine
# ============================================================================

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ============================================================================
# МЕТАДАННЫЕ
# ============================================================================
[project]
name = "action-machine"
version = "0.1.0"
description = "Intent-first business logic framework for Python — async, declarative, observable"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

authors = [
    { name = "Maxim Bystrov", email = "bystrovmaxim@gmail.com" },
]

keywords = [
    "actions", "aspects", "async", "asyncio", "business-logic",
    "framework", "declarative", "intent-first", "python"
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]

# --------------------------------------------------------------------------
# Runtime-зависимости — только то, что импортируется в src/action_machine/
# --------------------------------------------------------------------------
dependencies = [
    "simpleeval>=1.0.7",
    "rustworkx>=0.16.0",
]

# --------------------------------------------------------------------------
# Optional (contrib)
# --------------------------------------------------------------------------
[project.optional-dependencies]
postgres = [
    "asyncpg>=0.31.0",
]

# ============================================================================
# URL-ы
# ============================================================================
[project.urls]
Homepage = "https://gitverse.ru/bystrov.maxim/aoa"
Repository = "https://gitverse.ru/bystrov.maxim/aoa"
Issues = "https://gitverse.ru/bystrov.maxim/aoa/issues"

# ============================================================================
# ГРУППЫ ЗАВИСИМОСТЕЙ
# ============================================================================
[dependency-groups]

dev = [
    # Линтеры и анализаторы
    "mypy>=1.19.0",
    "ruff>=0.9.0",
    "pylint>=4.0.0",
    "vulture>=2.15",
    # Метрики кода
    "radon>=6.0.0",
    # Форматтеры
    "black>=25.1.0",
    "isort>=8.0.0",
    # Стабы типизации
    "asyncpg-stubs>=0.31.0",
    # Утилиты
    "pre-commit>=4.0.0",
    "taskipy>=1.14.0",
]

test = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=6.0.0",
    "anyio>=4.12.0",
]

# ============================================================================
# СБОРКА
# ============================================================================
[tool.hatch.build.targets.wheel]
packages = [
    "src/action_machine",
    "src/action_machine_contrib",
]

# ============================================================================
# PYTEST
# ============================================================================
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-v",
    "-ra",
]
markers = [
    "slow: тесты, выполняющиеся более 1 секунды",
    "integration: тесты, требующие внешних сервисов",
    "unit: быстрые изолированные тесты",
]

# ============================================================================
# MYPY
# ============================================================================
[tool.mypy]
python_version = "3.12"
strict = true
follow_imports = "normal"
warn_unreachable = true
no_implicit_reexport = true
exclude = ["venv", ".venv", "build", "dist"]

[[tool.mypy.overrides]]
module = ["simpleeval.*", "asyncpg.*"]
ignore_missing_imports = true

# ============================================================================
# COVERAGE
# ============================================================================
[tool.coverage.run]
source = ["src/action_machine"]
omit = ["tests/*", "**/__init__.py"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "\\.\\.\\.",
    "pass",
    "raise NotImplementedError",
]
show_missing = true
fail_under = 85

# ============================================================================
# PYLINT
# ============================================================================
[tool.pylint.main]
py-version = "3.12"
jobs = 0
ignore = ["venv", ".venv", "tests"]

[tool.pylint."messages control"]
disable = [
    "C0301",
    "C0103",
    "C0413",
    "R0903",
    "R0902",
    "C0304",
    "W0718",
    "W0613",
    "W0212",
    "W0107",
    "R0913",
    "R0914",
    "R0915",
    "R0917",
    "R0801",
    "R0904",
    "C0302",
    "E1101",
]

[tool.pylint.format]
max-line-length = 120

[tool.pylint."similarities"]
ignore-imports = "yes"

# ============================================================================
# RUFF
# ============================================================================
[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "ASYNC"]
ignore = ["E501", "E402"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ASYNC"]

# ============================================================================
# BLACK
# ============================================================================
[tool.black]
line-length = 120
target-version = ["py312"]

# ============================================================================
# ISORT
# ============================================================================
[tool.isort]
profile = "black"
line_length = 120
src_paths = ["src", "tests"]

# ============================================================================
# VULTURE
# ============================================================================
[tool.vulture]
min_confidence = 80
paths = ["src/action_machine"]
ignore_names = [
    "prepare", "handle", "delay", "extra_check",
    "on_global_start", "on_global_finish",
    "on_before_aspect", "on_after_aspect",
    "sync_run", "build_factory", "run_action",
    "get_wrapper_class",
    "hostname", "service_name", "service_version",
    "container_id", "pod_name", "trace_id",
    "request_timestamp", "request_path", "request_method",
    "full_url", "client_ip", "protocol", "user_agent",
    "user_id", "roles", "extra",
    "call_count", "last_params",
]

# ============================================================================
# TASKIPY
# ============================================================================
[tool.taskipy.tasks]
lint        = "ruff check src/ tests/"
lint-fix    = "ruff check --fix src/ tests/"
typecheck   = "mypy src/action_machine/"
pylint      = "pylint src/action_machine/"
dead        = "vulture"
format      = "black src/ tests/"
format-check = "black --check src/ tests/"
sort        = "isort src/ tests/"
sort-check  = "isort --check src/ tests/"
test        = "pytest tests/"
test-cov    = "pytest tests/ --cov=src/action_machine --cov-report=html --cov-report=term"
test-fast   = "pytest tests/ -m 'not slow'"
cc          = "radon cc src/action_machine/ -s -a"
mi          = "radon mi src/action_machine/ -s"
check-all   = "task lint && task typecheck && task pylint && task dead && task test && task cc && task mi"
pre-commit  = "task format && task sort && task lint-fix && task typecheck && task test-fast"
