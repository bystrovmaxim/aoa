# packages/aoa-mcp-adapter/pyproject.toml — publishable distribution for ``aoa.mcp``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-mcp-adapter"
version = "1.0.0"
description = "MCP adapter for AOA — expose Actions as MCP tools for AI agents."
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine>=1.0.0a5",
    "mcp>=1.0,<2.0",
]

[project.urls]
Homepage = "https://github.com/bystrovmaxim/aoa"
Repository = "https://github.com/bystrovmaxim/aoa"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
