# packages/aoa-examples/pyproject.toml — publishable distribution for ``aoa.examples``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-examples"
version = "1.0.0"
description = "Example FastAPI and MCP services demonstrating ActionMachine."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-graph==1.0.0",
    "aoa-action-machine==1.0.0",
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.100,<1.0",
    "uvicorn[standard]>=0.20,<1.0",
]
mcp = [
    "mcp>=1.0,<2.0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
