# packages/aoa-examples/pyproject.toml — publishable distribution for ``aoa.examples``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-examples"
version = "1.0.0"
description = "Example FastAPI and MCP services demonstrating ActionMachine."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine>=1.0.0a5,<2.0.0",
    "aoa-ocel>=1.0.0a0",
    "pydantic>=2.0,<3.0",
]

[tool.uv.sources]
aoa-action-machine = { workspace = true }
aoa-fastapi-adapter = { workspace = true }
aoa-mcp-adapter = { workspace = true }
aoa-ocel = { workspace = true }

[project.optional-dependencies]
fastapi = [
    "aoa-fastapi-adapter>=1.0.0a0",
]
mcp = [
    "aoa-mcp-adapter>=1.0.0a0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
