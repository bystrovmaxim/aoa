# packages/aoa-ocel/pyproject.toml — publishable distribution for ``aoa.ocel``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-ocel"
version = "1.0.0"
description = "OCEL 2.0 export for ActionMachine (contracts, plugin, resources)."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine==1.0.0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
