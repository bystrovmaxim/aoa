# packages/aoa-maxitor/pyproject.toml — publishable distribution for ``aoa.maxitor``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-maxitor"
version = "1.0.0"
description = "Visualization and sample domains built on ActionMachine."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine==1.0.0",
    "duckdb>=1.1,<2",
    "fastapi>=0.115,<1.0",
    "httpx>=0.27,<1.0",
    "networkx>=3.2,<4",
    "uvicorn>=0.30,<1.0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[project.scripts]
maxitor-api = "aoa.maxitor.api.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
