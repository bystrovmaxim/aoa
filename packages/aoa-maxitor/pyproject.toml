# packages/aoa-maxitor/pyproject.toml — publishable distribution for ``aoa.maxitor``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-maxitor"
version = "1.1.3"
description = "AOA system visualizer: bundled React SPA + FastAPI backend."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine>=1.0.1a0",
    "aoa-fastapi-adapter>=1.0.0",
    "duckdb>=1.5,<2",
    "httpx>=0.28,<1.0",
    "uvicorn>=0.30",
]

[tool.uv.sources]
aoa-action-machine = { workspace = true }
aoa-fastapi-adapter = { workspace = true }

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[project.scripts]
maxitor-api = "aoa.maxitor.api.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
artifacts = ["src/aoa/maxitor/static/**/*"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
