# packages/aoa-langgraph-adapter/pyproject.toml — publishable distribution for ``aoa.langgraph``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-langgraph-adapter"
version = "1.0.0"
description = "LangGraph adapter for AOA — use Actions as LangGraph nodes."
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine>=1.0.0a5",
    "langgraph>=0.2,<1.0",
]

[project.urls]
Homepage = "https://github.com/bystrovmaxim/aoa"
Repository = "https://github.com/bystrovmaxim/aoa"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
filterwarnings = [
    "ignore::PendingDeprecationWarning:langgraph.*",
    "ignore::DeprecationWarning:langgraph.*",
]
