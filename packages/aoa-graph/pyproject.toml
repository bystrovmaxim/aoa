# packages/aoa-graph/pyproject.toml — publishable distribution for ``aoa.graph``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-graph"
version = "1.0.0"
description = "Graph model primitives (nodes, edges, coordinators) shared by ActionMachine."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "jsonschema>=4.17,<5",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
# Wheel layout must be ``aoa/graph/…`` so ``import aoa.graph`` works (PEP 420 namespace).
packages = ["src/aoa"]
