# packages/aoa-action-machine/pyproject.toml — publishable distribution for ``aoa.action_machine``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-action-machine"
version = "1.0.0"
description = "Intent-first business logic framework with metadata-driven actions and role-based access control."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-graph==1.0.0",
    "pydantic>=2.0,<3.0",
    "simpleeval>=1.0,<2.0",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.100,<1.0",
    "uvicorn[standard]>=0.20,<1.0",
]
mcp = [
    "mcp>=1.0,<2.0",
]
postgres = [
    "asyncpg>=0.29,<1.0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]
