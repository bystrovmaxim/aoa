# packages/aoa-action-machine/pyproject.toml — publishable distribution for ``aoa.action_machine``.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-action-machine"
version = "1.0.0a5"
description = "Intent-first business logic framework with metadata-driven actions and role-based access control."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "jsonschema>=4.17",
    "pydantic>=2.0,<3.0",
    "simpleeval>=1.0,<2.0",
]

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.29,<1.0",
]

[project.urls]
Homepage = "https://github.com/action-machine/action-machine"
Documentation = "https://action-machine.readthedocs.io"
Repository = "https://github.com/action-machine/action-machine"

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "anyio>=4.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
addopts = ["-ra", "--strict-markers", "--tb=short"]
markers = [
    "slow: slow test",
    "integration: integration test (may require external services)",
    "benchmark: performance benchmark test",
    "graph_coverage: graph-coverage assertion test",
    "facet_skeleton: facet skeleton test",
]
