[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aoa-otel"
version = "1.0.0"
description = "OpenTelemetry plugin for AOA — traces and state x-ray for action runs."
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "@Bystrov.Maxim" }]
dependencies = [
    "aoa-action-machine>=1.0.0a5",
    "opentelemetry-api>=1.20,<2.0",
    "opentelemetry-sdk>=1.20,<2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/aoa"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
