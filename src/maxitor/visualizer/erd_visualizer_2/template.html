<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@@HTML_ESCAPED_TITLE@@</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f5f7;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Left domain panel — typography aligned with graph_visualizer .color-legend (Node types) ── */
    .domain-picker {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100000;
      background: #fff;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 200px;
      max-width: 280px;
      max-height: 56vh;
      overflow-y: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      color: #374151;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .domain-picker .legend-title {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-bottom: 2px;
    }
    .domain-picker .domain-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }
    .domain-picker .domain-row:hover { background: #f3f4f6; }
    .domain-picker .domain-row.is-on {
      background: #e7efff;
      color: #1d4ed8;
    }
    .domain-picker .domain-row.is-off {
      opacity: 0.55;
    }
    .domain-picker .domain-row.is-off .domain-row-label {
      text-decoration: line-through;
      text-decoration-color: #9ca3af;
    }
    .domain-picker .legend-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.1);
      display: block;
      box-sizing: border-box;
    }
    .domain-picker .legend-icon--accent { background-image: none; }
    .domain-picker .domain-row-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
      font-weight: 500;
    }

    /* ── Main canvas area ── */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    /* Fixed dot backdrop (does not zoom / pan with diagram content) */
    #main::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: #f4f5f7;
      background-image: radial-gradient(rgba(160, 168, 180, 0.42) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    /* Stacking: dot layer is ::before; do NOT use #main > * or it overrides
       .alt-container / absolute canvas children (ID beats class — content “disappeared”). */
    #d3gv-container,
    #cy-container,
    #mermaid-container,
    #graph-hover-labels {
      z-index: 1;
    }
    .alt-container {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      background: transparent;
      padding: 0;
    }
    .alt-container.active { display: block; }

    /* Graphviz SVG container */
    #d3gv-container {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      background: transparent;
    }
    #d3gv-container.active { display: block; }

    /* Cytoscape container */
    #cy-container {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      background: transparent;
    }
    #cy-container.active { display: block; }

    /* SVG pan / zoom layers (content scales; backdrop stays fixed via #main::before) */
    .erd-svg-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      background: transparent;
    }
    .erd-svg-viewport.erd-panning { cursor: grabbing; }
    .erd-svg-panner {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .erd-svg-panner > svg {
      display: block;
      max-width: none;
      height: auto;
    }

    /* ── Bottom toolbar: zoom + 8 mode icons + neighbor flag (no card chrome) ── */
    #zoom-toolbar.zoom-toolbar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 100000;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      background: transparent;
      backdrop-filter: none;
      border: none;
      border-radius: 0;
      padding: 2px 0;
      box-shadow: none;
    }
    #zoom-toolbar .zoom-cluster {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    #zoom-toolbar .toolbar-sep {
      width: 1px;
      height: 22px;
      background: rgba(15, 23, 42, 0.12);
      flex-shrink: 0;
      margin: 0 2px;
    }
    #zoom-toolbar .zoom-btn {
      min-width: 0;
      width: 30px;
      height: 30px;
      padding: 0;
      font-size: 15px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #64748b;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    #zoom-toolbar .zoom-btn:hover {
      color: #0f172a;
      background: rgba(15, 23, 42, 0.06);
    }
    #zoom-toolbar .zoom-pct {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      color: #64748b;
      user-select: none;
      padding: 0 6px 0 4px;
      min-width: 3.1em;
    }

    /* Mode dock: 8 presets (5 GV + 2 CY + 1 Mermaid) */
    #zoom-toolbar .mode-dock {
      display: flex;
      align-items: center;
      gap: 1px;
    }
    #zoom-toolbar .mode-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    #zoom-toolbar .mode-btn:hover {
      color: #0f172a;
      background: rgba(15, 23, 42, 0.06);
    }
    #zoom-toolbar .mode-btn svg {
      display: block;
      flex-shrink: 0;
      pointer-events: none;
    }
    #zoom-toolbar .mode-btn.mode-btn--gv.active {
      color: #1d4ed8;
      background: rgba(59, 130, 246, 0.12);
      box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.4);
    }
    #zoom-toolbar .mode-btn.mode-btn--cy.active {
      color: #7c3aed;
      background: rgba(168, 85, 247, 0.12);
      box-shadow: inset 0 0 0 1px rgba(168, 85, 247, 0.45);
    }
    #zoom-toolbar .mode-btn.mode-btn--mm.active {
      color: #db2777;
      background: rgba(236, 72, 153, 0.1);
      box-shadow: inset 0 0 0 1px rgba(236, 72, 153, 0.45);
    }

    /* 1-hop neighbor checkbox — same strip */
    #zoom-toolbar #neighborhood-filter.dock-neighbor {
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      padding: 0 4px;
      cursor: pointer;
      user-select: none;
      font-size: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #64748b;
      transition: color 0.15s;
    }
    #zoom-toolbar #neighborhood-filter.dock-neighbor:hover {
      color: #334155;
    }
    #zoom-toolbar #neighborhood-filter input {
      width: 14px;
      height: 14px;
      accent-color: #3b82f6;
      cursor: pointer;
      margin: 0;
    }

    /* ── Node detail panel (typography matches erd_visualizer .domain-picker) ── */
    #node-detail-shell {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(306px, calc(92vw * 0.85));
      max-width: 306px;
      z-index: 100001;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      border-left: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.07);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      pointer-events: none;
    }
    #node-detail-shell.open {
      transform: translateX(0);
      pointer-events: auto;
    }

    #node-detail-header {
      flex-shrink: 0;
      padding: 8px 10px 10px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }
    #node-detail-title {
      font-weight: 600;
      font-size: 11px;
      color: #2c3e50;
      letter-spacing: 0.02em;
      line-height: 1.3;
      padding-right: 8px;
    }
    #node-detail-close {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #757575;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #node-detail-close:hover {
      background: #f5f5f5;
      color: #333;
    }
    #node-detail-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 11px;
      line-height: 1.45;
      color: #2c3e50;
    }

    .detail-section { margin-bottom: 14px; }
    .detail-section-title {
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5c6370;
      margin-bottom: 6px;
    }
    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 6px;
      margin: 0 -6px;
      border-radius: 6px;
      border-bottom: none;
      font-size: 11px;
    }
    .field-row:hover { background: #eef0f3; }
    .field-icon { font-size: 10px; margin-top: 1px; flex-shrink: 0; color: #5c6370; }
    .field-name { flex: 1; color: #2c3e50; font-weight: 500; }
    .field-type { color: #5c6370; font-style: italic; }
    .field-badges { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
    .badge {
      font-size: 9px; padding: 1px 5px;
      border-radius: 99px; font-weight: 600; letter-spacing: .03em;
    }
    .badge-pk  { background: #fef3c7; color: #92400e; }
    .badge-fk  { background: #dbeafe; color: #1e40af; }
    .badge-uq  { background: #f3e8ff; color: #6b21a8; }
    .badge-nn  { background: #dcfce7; color: #166534; }

    .rel-row {
      font-size: 11px;
      padding: 4px 6px;
      margin: 0 -6px;
      border-radius: 6px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rel-row:hover { background: #eef0f3; }
    .rel-arrow { color: #5c6370; flex-shrink: 0; }
    .rel-target { font-weight: 500; color: #2c3e50; }

    /* ── Hover tip ── */
    #erd-hover-tip {
      position: fixed; display: none; pointer-events: none;
      background: #1e293b; color: #f1f5f9;
      font-size: 11px; padding: 6px 10px;
      border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.25);
      z-index: 9999; max-width: 260px; line-height: 1.5;
    }

    #graph-hover-labels {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 40;
    }

    /* ── Loading / error ── */
    .erd-loading {
      font-size: 13px; color: #64748b;
      padding: 32px; font-family: system-ui, sans-serif;
    }
    .erd-error {
      white-space: pre-wrap; color: #991b1b;
      background: #fff; border: 1px solid #fecaca;
      border-radius: 8px; padding: 16px;
      font-size: 11px; line-height: 1.5;
      font-family: ui-monospace, monospace;
      max-width: 900px; margin: 20px auto;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>

  <aside id="domain-picker" class="domain-picker" aria-label="Domains" style="display: none"></aside>

  <!-- ══ Main area ══ -->
  <div id="main">

    <!-- Graphviz SVG renderer -->
    <div id="d3gv-container"></div>

    <!-- Cytoscape graph renderer -->
    <div id="cy-container"></div>

    <!-- Mermaid -->
    <div class="alt-container" id="mermaid-container"></div>

    <!-- Zoom + 8 layout modes + neighbor flag -->
    <div id="zoom-toolbar" class="zoom-toolbar" aria-label="View controls">
      <div class="zoom-cluster">
        <button type="button" class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
        <button type="button" class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
        <button type="button" class="zoom-btn" id="btn-zoom-fit" title="Fit to window">⊡</button>
        <span class="zoom-pct" id="zoom-pct">100%</span>
      </div>
      <span class="toolbar-sep" aria-hidden="true"></span>
      <div class="mode-dock" id="mode-dock" role="toolbar" aria-label="Diagram mode"></div>
      <label id="neighborhood-filter" class="dock-neighbor"
        title="When on, include entities exactly one interchange relation away from the selected domain(s).">
        <input type="checkbox" id="neighborhood-expand" checked />
        <span>1‑hop</span>
      </label>
    </div>

    <div id="graph-hover-labels"></div>
  </div>

  <!-- ══ Node detail panel ══ -->
  <div id="node-detail-shell">
    <div id="node-detail-header">
      <span id="node-detail-title">Entity</span>
      <button type="button" id="node-detail-close" title="Close" aria-label="Close properties">×</button>
    </div>
    <div id="node-detail-body"></div>
  </div>

  <!-- ══ Hover tooltip ══ -->
  <div id="erd-hover-tip"></div>

  <!-- ══ Bootstrap ══ -->
  <script type="module">
@@INLINE_ERD_SCRIPT@@
  </script>

</body>
</html>
