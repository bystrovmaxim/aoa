<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>@@HTML_ESCAPED_TITLE@@</title>
    <script src="@@G6_CDN_URL@@"></script>
    <style>
        @@INTERCHANGE_CHROME_CSS@@
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
        /* G6 canvas shell; hover labels stack above via #graph-hover-labels. */
        #container {
            position: relative;
            width: @@CONTAINER_WIDTH@@;
            height: @@CONTAINER_HEIGHT@@;
            background-color: var(--ix-surface);
            background-image: radial-gradient(var(--ix-grid-dot) 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }
        #graph-hover-labels {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            overflow: visible;
        }
        .graph-hover-label {
            position: absolute;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--ix-text-strong);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.01em;
            max-width: 168px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            transform: translate(-50%, 0);
            padding: 3px 8px 3px 7px;
            border-radius: 0;
            background: var(--ix-frost-solid);
            border: 1px solid var(--ix-border);
            border-left: 3px solid var(--ix-neutral-stripe);
            box-shadow: var(--ix-shadow);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="color-legend" class="color-legend ix-legend-panel"></div>
    <aside id="node-detail-shell" class="node-detail-shell ix-node-detail-shell" aria-hidden="true">
      <div class="node-detail-panel">
        <button type="button" class="node-detail-close" id="node-detail-close" aria-label="Close properties">×</button>
        <div id="node-detail-body"></div>
      </div>
    </aside>
    <div id="zoom-toolbar" class="zoom-toolbar" aria-label="View controls">
        <div class="zoom-cluster">
            <button type="button" class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
            <button type="button" class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
            <button type="button" class="zoom-btn" id="btn-zoom-fit" title="Fit to window">⊡</button>
            <span class="zoom-pct" id="zoom-pct">100%</span>
        </div>
    </div>
    <script>
@@DETAIL_PANEL_SCRIPT@@

@@INLINE_G6_SCRIPT@@
    </script>
</body>
</html>
