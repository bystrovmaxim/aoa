# Package import boundaries for production code under packages/*/src/aoa/.
# Keys action_machine | ocel | maxitor | examples are canonical internal names.
# may_import lists which other internal packages a package may import (not including itself).

[packages.action_machine]
current_roots = ["packages/aoa-action-machine/src/aoa/action_machine"]
future_roots = ["packages/aoa-action-machine/src/aoa/action_machine"]
import_prefixes = ["action_machine", "aoa.action_machine"]
may_import = []

[packages.ocel]
current_roots = ["packages/aoa-ocel/src/aoa/ocel"]
future_roots = ["packages/aoa-ocel/src/aoa/ocel"]
import_prefixes = ["aoa.ocel"]
may_import = ["action_machine"]

[packages.otel]
current_roots = ["packages/aoa-otel/src/aoa/otel"]
future_roots = ["packages/aoa-otel/src/aoa/otel"]
import_prefixes = ["aoa.otel"]
may_import = ["action_machine"]

[packages.maxitor]
current_roots = ["packages/aoa-maxitor/src/aoa/maxitor"]
future_roots = ["packages/aoa-maxitor/src/aoa/maxitor"]
import_prefixes = ["maxitor", "aoa.maxitor"]
may_import = ["action_machine"]

[packages.examples]
current_roots = ["packages/aoa-examples/src/aoa/examples"]
future_roots = ["packages/aoa-examples/src/aoa/examples"]
import_prefixes = ["examples", "aoa.examples"]
may_import = ["action_machine", "ocel"]

# --- Test zones: repo-relative roots; may_import lists other internal packages (not self).

[tests.zones.graph]
roots = ["tests/graph"]
may_import = ["action_machine"]

[tests.zones.action_machine]
roots = ["tests/action_machine"]
may_import = ["action_machine"]

[tests.zones.ocel]
roots = ["tests/ocel"]
may_import = ["action_machine", "ocel"]

[tests.zones.otel]
roots = ["tests/otel"]
may_import = ["action_machine", "otel"]

# Partially migrated: the clean example tests live in packages/aoa-examples/tests/;
# the two OCEL tests below depend on tests/ocel/pm4py_validation and stay here until
# the shared test-support helpers are extracted (#82 blocker).
[tests.zones.examples]
roots = ["tests/examples"]
may_import = ["action_machine", "examples"]

[tests.zones.integration]
roots = ["tests/integration"]
may_import = ["action_machine", "maxitor", "examples"]

[tests.zones.packaging]
roots = ["tests/packaging"]
may_import = ["action_machine", "maxitor", "examples"]

# Production-only import exceptions (rare). Each row must include path, imports, reason, expires.
allow = []
